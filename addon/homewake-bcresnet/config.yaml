name: HomeWake BC-ResNet
version: "0.0.0"
slug: homewake-bcresnet
description: Wyoming-facing BC-ResNet wake word runtime for Home Assistant
arch:
  - amd64
  - aarch64
  - armv7
  - i386
startup: services
boot: auto
init: false
image: ghcr.io/homewake/{arch}-addon-homewake-bcresnet
ports:
  10700/tcp: 10700
ports_description:
  10700/tcp: Wyoming service metadata port
map:
  - share:rw
options:
  host: 0.0.0.0
  port: 10700
  detector_backend: bcresnet
  manifest: /app/models/manifest.yaml
  log_level: info
schema:
  host: str
  port: int
  detector_backend: str
  manifest: str
  log_level: str
