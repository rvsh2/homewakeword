name: homewakeword-ha-supervised

services:
  ha_supervisor:
    image: ghcr.io/home-assistant/amd64-hassio-supervisor:latest
    privileged: true
    restart: "no"
    environment:
      SUPERVISOR_MACHINE: generic-x86-64
      SUPERVISOR_SHARE: /opt/homewakeword/.homewakeword/ha-supervised/share
      SUPERVISOR_NAME: homewakeword-smoke
    volumes:
      - ha_data:/data
      - /opt/homewakeword/.homewakeword/ha-supervised/share:/opt/homewakeword/.homewakeword/ha-supervised/share
      - /etc/machine-id:/etc/machine-id:ro
      - /run/dbus:/run/dbus:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ha_supervised

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: "no"
    depends_on:
      - ha_supervisor
    volumes:
      - ha_config:/config
    networks:
      - ha_supervised

  addon_registry:
    image: registry:2
    restart: "no"
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:80
    ports:
      - "5000:80"
    networks:
      - ha_supervised

volumes:
  ha_data: {}
  ha_config: {}

networks:
  ha_supervised: {}
