[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "homewake-bcresnet"
version = "0.0.0"
description = "HomeWake BC-ResNet Home Assistant add-on skeleton"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6",
]

[tool.setuptools]
packages = ["homewake"]

[tool.pytest.ini_options]
testpaths = ["tests"]
